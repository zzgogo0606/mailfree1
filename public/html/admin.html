<!DOCTYPE html>
<html lang="zh-CN" class="precheck-hide">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>用户管理 - iDing's临时邮箱</title>
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <noscript>
      <meta http-equiv="refresh" content="0; url=/templates/loading.html?redirect=%2Fhtml%2Fadmin.html" />
    </noscript>
    <style>.precheck-hide body{ visibility: hidden !important; }</style>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="shortcut icon" href="/favicon.svg" type="image/svg+xml" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/css/app.css" />
    <link rel="stylesheet" href="/css/app-sidebar.css" />
    <link rel="stylesheet" href="/css/app-mailbox.css" />
    <link rel="stylesheet" href="/css/app-compose.css" />
    <link rel="stylesheet" href="/css/app-modal.css" />
    <link rel="stylesheet" href="/css/app-responsive.css" />
    <link rel="stylesheet" href="/css/admin.css" />
    <!-- 暗黑模式样式 -->
    <link rel="stylesheet" href="/css/app_black.css" />
    <link rel="stylesheet" href="/css/admin_black.css" />
    <!-- 主题切换支持 -->
    <script src="/js/theme-toggle.js"></script>
    <script src="/js/auth-guard.js" defer></script>
    <script>
      // 访问管理页先做前端快速鉴权，避免内容闪现；未登录或权限不足均进入 loading 或回首页
      (function(){
        fetch('/api/session', { headers: { 'Cache-Control': 'no-cache' } })
          .then(r => r.ok ? r.json() : Promise.reject('unauth'))
          .then(s => {
            if (s && (s.role === 'admin' || s.role === 'guest' || s.strictAdmin)){
              try{ document.documentElement.classList.remove('precheck-hide'); }catch(_){ }
              return;
            }
            // 已登录但无权限：回首页
            location.replace('/');
          })
          .catch(() => {
            // 未登录：进入加载页做鉴权
            if (window.AuthGuard) { window.AuthGuard.goLoading('/html/admin.html', '正在校验权限…'); }
            else { location.replace('/templates/loading.html?redirect=%2Fhtml%2Fadmin.html&status=' + encodeURIComponent('正在校验权限…')); }
          });
      })();
    </script>
  </head>
  <body class="admin-page">
    <!-- SVG Icon Sprites -->
    <svg style="display:none">
      <use href="/icons/sprites.svg#icon-mail"/>
    </svg>

    <div class="topbar">
      <div class="brand">
        <span class="brand-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <use href="/icons/sprites.svg#icon-rocket"/>
          </svg>
        </span>
        <span>iDing's临时邮箱 - 用户管理</span>
      </div>
      <div class="nav-actions">
        <button id="back" class="btn btn-ghost" title="返回邮箱" aria-label="返回邮箱页面">
          <span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <use href="/icons/sprites.svg#icon-mail"/>
            </svg>
          </span>
          <span>返回邮箱</span>
        </button>
        <button id="logout" class="btn btn-secondary" title="退出登录" aria-label="退出登录">
          <span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <use href="/icons/sprites.svg#icon-logout"/>
            </svg>
          </span>
          <span>退出登录</span>
        </button>
      </div>
    </div>
    <div id="demo-banner" class="demo-banner" style="display:none">当前为演示管理页：所有改动仅在浏览器会话中模拟</div>
    <div class="admin-container">
      <!-- 统计卡片区域 -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
          </div>
          <div class="stat-info">
            <span class="stat-value" id="stat-total-users">0</span>
            <span class="stat-label">总用户数</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon stat-icon-admin">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2L2 7l10 5 10-5-10-5z"/>
              <path d="M2 17l10 5 10-5"/>
              <path d="M2 12l10 5 10-5"/>
            </svg>
          </div>
          <div class="stat-info">
            <span class="stat-value" id="stat-admin-count">0</span>
            <span class="stat-label">管理员</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon stat-icon-mailbox">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
          </div>
          <div class="stat-info">
            <span class="stat-value" id="stat-mailbox-count">0</span>
            <span class="stat-label">邮箱总数</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon stat-icon-active">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
            </svg>
          </div>
          <div class="stat-info">
            <span class="stat-value" id="stat-active-users">0</span>
            <span class="stat-label">可发件用户</span>
          </div>
        </div>
      </div>

      <!-- 主内容区域 -->
      <div class="admin-main">
        <div class="admin-left">
          <!-- 操作面板 -->
          <div class="card action-card">
            <div class="action-header">
              <h2>
                <span class="card-icon">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <use href="/icons/sprites.svg#icon-settings"/>
                  </svg>
                </span>
                <span>管理操作</span>
              </h2>
            </div>
            <div class="action-buttons">
              <button id="u-open" class="action-btn action-btn-primary" aria-label="创建新用户">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <use href="/icons/sprites.svg#icon-plus"/>
                </svg>
                <span>创建用户</span>
              </button>
              <button id="a-open" class="action-btn action-btn-secondary" aria-label="分配邮箱">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <use href="/icons/sprites.svg#icon-inbox"/>
                </svg>
                <span>分配邮箱</span>
              </button>
              <button id="unassign-open" class="action-btn action-btn-outline" aria-label="取消分配邮箱">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <use href="/icons/sprites.svg#icon-inbox-empty"/>
                </svg>
                <span>取消分配</span>
              </button>
            </div>
          </div>

          <!-- 用户列表 -->
          <div class="card">
            <div class="card-header">
              <h2>
                <span class="card-icon">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <use href="/icons/sprites.svg#icon-users"/>
                  </svg>
                </span>
                <span>用户列表</span>
                <span id="users-count" class="badge-count">0 人</span>
              </h2>
              <button id="users-refresh" class="btn btn-ghost btn-icon" title="刷新用户列表" aria-label="刷新">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <use href="/icons/sprites.svg#icon-refresh"/>
                </svg>
              </button>
            </div>
            <div id="users-loading" class="loading-indicator loading-indicator-sm">
              <div class="spinner"></div>
              <span>加载中…</span>
            </div>
            <div class="table-wrapper">
              <table class="table">
                <thead>
                  <tr>
                    <th class="col-id">ID</th>
                    <th class="col-username">用户名</th>
                    <th class="col-role">角色</th>
                    <th class="col-mailbox">邮箱</th>
                    <th class="col-can">发件</th>
                    <th class="col-created">创建时间</th>
                    <th class="col-actions">操作</th>
                  </tr>
                </thead>
                <tbody id="users-tbody"></tbody>
              </table>
            </div>
            <div class="pagination-container" id="users-pagination" style="display:none">
              <div class="pagination-info">
                <span id="pagination-text">显示 1-20 条，共 0 条</span>
              </div>
              <div class="pagination-controls">
                <button id="prev-page" class="btn btn-sm btn-pagination" disabled>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
                </button>
                <span id="page-info" class="page-num">1 / 1</span>
                <button id="next-page" class="btn btn-sm btn-pagination" disabled>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
                </button>
              </div>
            </div>
          </div>
        </div>
        <div class="admin-right">
          <div class="card">
            <div class="card-header">
              <h2>
                <span class="card-icon">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <use href="/icons/sprites.svg#icon-mail"/>
                  </svg>
                </span>
                <span>用户的邮箱</span>
                <span id="mailboxes-count" class="badge-count">0 个</span>
              </h2>
              <div class="selected-user" id="selected-user-info">
                <span class="selected-user-name">选择用户查看</span>
              </div>
            </div>
            <div id="user-mailboxes-loading" class="loading-indicator" style="margin: 4px 0 8px 0; display:none">
              <div class="spinner"></div>
              <span>加载中…</span>
            </div>
            <div id="user-mailboxes" class="mailbox-panel">
              <div class="mailbox-list" id="mailbox-list"></div>
              <div class="empty-state" id="empty-mailbox-list">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                  <polyline points="22,6 12,13 2,6"/>
                </svg>
                <p>点击左侧用户查看其邮箱</p>
              </div>
            </div>
            <div class="pagination-container" id="mailboxes-pagination" style="display:none">
              <div class="pagination-info">
                <span id="mailboxes-pagination-text">显示 1-20 条，共 0 条</span>
              </div>
              <div class="pagination-controls">
                <button id="mailboxes-prev-page" class="btn btn-sm btn-pagination" disabled>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
                </button>
                <span id="mailboxes-page-info" class="page-num">1 / 1</span>
                <button id="mailboxes-next-page" class="btn btn-sm btn-pagination" disabled>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 模态框 - 放在 body 根级别确保全屏模糊覆盖 -->
    <!-- 编辑用户 模态框 -->
    <div class="modal" id="edit-modal">
      <div class="modal-card">
        <div class="modal-header">
          <div class="modal-title">
            <span class="modal-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <use href="/icons/sprites.svg#icon-edit"/>
              </svg>
            </span>
            <span>编辑用户</span>
            <span id="edit-user-display" class="user-chip"></span>
          </div>
          <button id="edit-close" class="close-btn" aria-label="关闭">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <use href="/icons/sprites.svg#icon-x"/>
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="form-grid">
            <div class="form-group">
              <label class="form-label">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                新密码
              </label>
              <input id="edit-pass" class="input" type="password" placeholder="留空则不修改" />
            </div>
            <div class="form-group">
              <label class="form-label">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                  <circle cx="12" cy="7" r="4"/>
                </svg>
                新用户名
              </label>
              <input id="edit-new-name" class="input" placeholder="留空则不修改" />
            </div>
            <div class="form-group">
              <label class="form-label">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                  <polyline points="22,6 12,13 2,6"/>
                </svg>
                邮箱上限
              </label>
              <input id="edit-limit" class="input" type="number" min="0" placeholder="0" />
            </div>
          </div>
          <div class="toggle-group">
            <label class="toggle-label">
              <input id="edit-role-check" type="checkbox" class="toggle-input" />
              <span class="toggle-switch"></span>
              <span class="toggle-text">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                  <path d="M2 17l10 5 10-5"/>
                  <path d="M2 12l10 5 10-5"/>
                </svg>
                高级用户
              </span>
            </label>
            <label class="toggle-label">
              <input id="edit-send-check" type="checkbox" class="toggle-input" />
              <span class="toggle-switch"></span>
              <span class="toggle-text">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <line x1="22" y1="2" x2="11" y2="13"/>
                  <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
                允许发件
              </span>
            </label>
          </div>
        </div>
        <div class="modal-footer">
          <button id="edit-delete" class="btn btn-danger-outline">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
            </svg>
            删除
          </button>
          <div class="modal-actions">
            <button id="edit-cancel" class="btn btn-secondary">取消</button>
            <button id="edit-save" class="btn btn-primary">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
              保存
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- 自定义确认对话框 -->
    <div class="modal" id="admin-confirm-modal">
      <div class="modal-card confirm-card">
        <div class="modal-header confirm-header">
          <div class="modal-title">
            <span class="modal-icon confirm-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                <line x1="12" y1="9" x2="12" y2="13"/>
                <line x1="12" y1="17" x2="12.01" y2="17"/>
              </svg>
            </span>
            <span>确认操作</span>
          </div>
          <button id="admin-confirm-close" class="close-btn" aria-label="关闭">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <use href="/icons/sprites.svg#icon-x"/>
            </svg>
          </button>
        </div>
        <div class="modal-body confirm-body">
          <div id="admin-confirm-message" class="confirm-message"></div>
          <div class="confirm-actions">
            <button id="admin-confirm-cancel" class="btn btn-secondary">取消</button>
            <button id="admin-confirm-ok" class="btn btn-danger">确认</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 创建用户 模态框 -->
    <div class="modal" id="u-modal">
      <div class="modal-card">
        <div class="modal-header">
          <div class="modal-title">
            <span class="modal-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <use href="/icons/sprites.svg#icon-user-plus"/>
              </svg>
            </span>
            <span>创建用户</span>
          </div>
          <button id="u-close" class="close-btn" aria-label="关闭">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <use href="/icons/sprites.svg#icon-x"/>
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="config-form">
            <div class="form-group">
              <label class="form-label">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                  <circle cx="12" cy="7" r="4"/>
                </svg>
                用户名
              </label>
              <input id="u-name" class="input" placeholder="输入用户名" />
            </div>
            <div class="form-group">
              <label class="form-label">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                密码
              </label>
              <input id="u-pass" class="input" type="password" placeholder="输入密码" />
            </div>
            <div class="form-group">
              <label class="form-label">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                  <path d="M2 17l10 5 10-5"/>
                  <path d="M2 12l10 5 10-5"/>
                </svg>
                角色
              </label>
              <select id="u-role" class="select">
                <option value="user">普通用户</option>
                <option value="admin">管理员</option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button id="u-cancel" class="btn btn-secondary">取消</button>
          <button id="u-create" class="btn btn-primary">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <use href="/icons/sprites.svg#icon-plus"/>
            </svg>
            创建
          </button>
        </div>
      </div>
    </div>

    <!-- 分配邮箱 模态框 -->
    <div class="modal" id="a-modal">
      <div class="modal-card">
        <div class="modal-header">
          <div class="modal-title">
            <span class="modal-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <use href="/icons/sprites.svg#icon-inbox"/>
              </svg>
            </span>
            <span>分配邮箱</span>
          </div>
          <button id="a-close" class="close-btn" aria-label="关闭">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <use href="/icons/sprites.svg#icon-x"/>
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="config-form">
            <div class="form-group">
              <label class="form-label">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                  <circle cx="12" cy="7" r="4"/>
                </svg>
                用户名
              </label>
              <input id="a-name" class="input" placeholder="输入用户名" />
            </div>
            <div class="form-group">
              <label class="form-label">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

    <div id="footer-slot"></div>

    <script>
      // 动态加载公共 footer 模板，并在宿主页面设置年份，确保执行
      (async function(){
        try{
          const res = await fetch('/templates/footer.html', { cache: 'no-cache' });
          const html = await res.text();
          const slot = document.getElementById('footer-slot');
          if (slot){
            slot.outerHTML = html;
            // 等 DOM 更新后填充年份
            setTimeout(() => {
              const y = document.getElementById('footer-year');
              if (y) y.textContent = new Date().getFullYear();
            }, 0);
          }
        }catch(_){ }
      })();
    </script>
