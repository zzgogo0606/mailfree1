name = "mailfree1"
# name = "mail-exhibit"
main = "src/server.js"
compatibility_date = "2024-01-01"
keep_vars=true

# D1 数据库绑定
[[d1_databases]]
binding = "TEMP_MAIL_DB"
database_name = "maill_free_db" #你的d1数据库名称
database_id = "95f9cf01-4a3f-427a-9ea9-167bb8cbc644" # 你的database_id
# 登录会话过期时间（单位：天，默认7天）
# 环境变量
[vars]
# FORWARD_RULES="[{"prefix":"vip","email":"a@example.com"},{"prefix":"*","email":"example@qq.com"}]"
ADMIN_NAME="mail"
ADMIN_PASSWORD="Aa1992353"
GUEST_PASSWORD="Aa1992353"
JWT_TOKEN="Aa1992353"
JWT_TOKENGUEST_PASSWORD="Aa1992353"
SESSION_EXPIRE_DAYS="365"
MAIL_DOMAIN="keket.shop,mxhx.shop,xmyz.shop"
RESEND_API_KEY="Aa1992353"
EMAIL_WEBHOOK_URL="http://192.168.50.100:7788"
EMAIL_WEBHOOK_SECRET="Aa1992353"
EMAIL_WEBHOOK_TIMEOUT_MS="10000"



# 静态资源目录（Workers + Assets）
[assets]
directory = "public"
# 显式指定绑定名，确保在 Worker 中通过 env.ASSETS 可用
binding = "ASSETS"


# wrangler.toml (wrangler v3.88.0^) 日志服务
# [observability.logs]
# enabled = true